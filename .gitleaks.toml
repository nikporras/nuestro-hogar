# gitleaks configuration for Nuestro Hogar.
# Extends the default ruleset; only adds an allowlist for the documented
# placeholder in the env template (it is not a real credential).

[extend]
useDefault = true

[allowlist]
description = "Ignore documented placeholders"
paths = [
  '''\.env\.example$''',
]
regexes = [
  '''sk-ant-REPLACE_ME''',
]
