<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#667eea" />
<!-- Phase 1: fully self-contained, no external calls, no secrets. CSP locks everything to 'self'. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src https://ohcvdgvsrvqjzxozgpat.supabase.co; manifest-src 'self'; worker-src 'self'; base-uri 'none'; form-action 'none'" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<title>Olympaws</title>
<style>
  :root{
    --accent1:#667eea; --accent2:#764ba2;
    --p1:#2196F3; --p1bg:#e8f4fd;
    --p2:#E91E63; --p2bg:#fce4ec;
    --diario:#FF6B35; --semanal:#4CAF50; --quincenal:#9C27B0; --mensual:#FF9800;
    --done:#4CAF50; --bg:#f8f7ff; --surface:#ffffff;
    --shadow:0 2px 12px rgba(102,126,234,0.12);
    --text:#2b2b3a; --muted:#8a8a9a;
    /* component surfaces — flipped by the dark scheme below */
    --border:#e3e3ee;
    --input-bg:#fafaff;
    --soft-accent:#eef0ff;
    --soft-accent-text:var(--accent2);
    --ghost-btn:#f0f0f6;
    --bar-bg:#eee;
    --bd-bar-bg:#f0f0f6;
    --grab:#dcdce6;
    --check-border:#d9d9e6;
    --mdot-done:#cfcfda;
    --danger:#c62828;
    --danger-bg:#fdecea;
    --danger-border:#f3c0c0;
    --overlay:rgba(40,30,60,.45);
    --header-text:#ffffff;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e0e16; --surface:#1a1a26;
      --text:#e8e8ef; --muted:#8a8aa0;
      --shadow:0 2px 12px rgba(0,0,0,0.45);
      --border:#2c2c3c;
      --input-bg:#1a1a26;
      --soft-accent:#252a40;
      --soft-accent-text:#b3bdff;
      --ghost-btn:#1c1c28;
      --bar-bg:#22222e;
      --bd-bar-bg:#22222e;
      --grab:#3a3a4a;
      --check-border:#3a3a4a;
      --mdot-done:#3c3c4e;
      --danger:#ff7a7a;
      --danger-bg:#2c1414;
      --danger-border:#5a2424;
      --overlay:rgba(0,0,0,.65);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overscroll-behavior:none;}
  body.modal-open{overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text);
    max-width:480px; margin:0 auto; min-height:100vh;
    padding-bottom:78px;
  }
  /* Header */
  .header{
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    color:var(--header-text); padding:18px 20px 20px; border-radius:0 0 22px 22px;
    box-shadow:0 4px 18px rgba(118,75,162,0.25);
  }
  .header .title{display:flex;align-items:center;gap:9px;font-size:21px;font-weight:700;}
  .header .sub{font-size:12.5px;opacity:.85;margin-top:2px;}
  .progress-wrap{margin-top:15px;}
  .progress-top{display:flex;justify-content:space-between;font-size:12.5px;opacity:.95;margin-bottom:6px;}
  .progress-bar{height:9px;background:rgba(255,255,255,.28);border-radius:20px;overflow:hidden;}
  .progress-fill{height:100%;background:#fff;border-radius:20px;transition:width .4s ease;}
  .filters{display:flex;gap:8px;margin-top:14px;}
  .chip{
    border:none;font:inherit;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:20px;
    background:rgba(255,255,255,.18);color:#fff;cursor:pointer;backdrop-filter:blur(4px);
  }
  .chip.active{background:#fff;color:var(--accent2);}

  /* Content */
  .content{padding:16px 14px 8px;}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:6px 4px 10px;}

  /* Chore card */
  .card{
    background:var(--surface);border-radius:16px;padding:13px 14px;margin-bottom:10px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:13px;
    transition:transform .12s ease, opacity .2s ease;
  }
  .card.done{opacity:.62;}
  .check{
    width:30px;height:30px;border-radius:50%;border:2.5px solid var(--check-border);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;
    transition:all .15s ease;background:transparent;
  }
  .check.on{border-color:var(--done);background:var(--done);}
  .card-icon{font-size:23px;width:30px;text-align:center;flex-shrink:0;}
  .card-main{flex:1;min-width:0;}
  .card-name{font-size:15px;font-weight:600;}
  .card.done .card-name{text-decoration:line-through;color:var(--muted);}
  .card-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;color:#fff;}
  .tag.person{cursor:pointer;}

  /* Week strip */
  .week-strip{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:6px;}
  .day-pill{
    flex:1;min-width:44px;background:var(--surface);border-radius:14px;padding:9px 4px;text-align:center;
    cursor:pointer;box-shadow:var(--shadow);border:2px solid transparent;
  }
  .day-pill.active{border-color:var(--accent1);}
  .day-pill.future{opacity:.45;}
  .day-pill .dow{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;}
  .day-pill .num{font-size:17px;font-weight:700;margin-top:2px;}
  .day-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent1);margin:4px auto 0;}
  .day-pill .dot.empty{background:transparent;}
  .today-ring{outline:2px solid var(--accent2);outline-offset:1px;}

  /* Month grid */
  .month-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .month-head div{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .mcell{
    aspect-ratio:1/1;background:var(--surface);border-radius:10px;box-shadow:var(--shadow);
    padding:4px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative;
  }
  .mcell.out{opacity:.32;box-shadow:none;background:transparent;}
  .mcell .d{font-size:11.5px;font-weight:700;}
  .mcell.today .d{background:var(--accent2);color:#fff;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;}
  .mcell .dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px;}
  .mcell .mdot{width:5px;height:5px;border-radius:50%;}
  .mcell{cursor:pointer;}
  .mcell.out{cursor:default;}
  .mcell.sel{outline:2px solid var(--accent1);outline-offset:-2px;}

  /* Logros */
  .vs-card{background:var(--surface);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
  .vs-row{margin-bottom:16px;}
  .vs-row:last-child{margin-bottom:0;}
  .vs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .vs-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;}
  .vs-pct{font-weight:800;font-size:16px;}
  .vs-bar{height:13px;border-radius:20px;background:var(--bar-bg);overflow:hidden;}
  .vs-fill{height:100%;border-radius:20px;transition:width .5s ease;}
  .trophy{text-align:center;font-size:14px;font-weight:700;margin-bottom:14px;}
  .trophy .big{font-size:38px;display:block;margin-bottom:4px;}
  .breakdown{display:flex;justify-content:space-between;gap:5px;margin-top:6px;}
  .bd-day{flex:1;text-align:center;}
  .bd-day .lbl{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .bd-bar{height:54px;background:var(--bd-bar-bg);border-radius:7px;display:flex;flex-direction:column-reverse;overflow:hidden;}
  .bd-seg{width:100%;}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  .empty .big{font-size:40px;display:block;margin-bottom:10px;}

  /* FAB */
  .fab{
    position:fixed;right:calc(50% - 240px + 18px);bottom:90px;width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;font-size:28px;
    box-shadow:0 6px 18px rgba(118,75,162,.45);cursor:pointer;z-index:20;line-height:1;
  }
  @media(max-width:480px){.fab{right:18px;}}

  /* Bottom nav */
  .nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:var(--surface);display:flex;justify-content:space-around;padding:8px 4px 10px;
    box-shadow:0 -2px 14px rgba(102,126,234,.12);z-index:15;
  }
  .nav button{
    border:none;background:none;font:inherit;color:var(--muted);font-size:10.5px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 8px;flex:1;
  }
  .nav button .ic{font-size:20px;}
  .nav button.active{color:var(--accent2);}

  /* Modal */
  .overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:flex-end;justify-content:center;z-index:40;}
  .modal{background:var(--surface);color:var(--text);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 18px 26px;}
  .modal h3{margin:0 0 16px;font-size:18px;}
  .modal.tall{height:84vh;max-height:84vh;display:flex;flex-direction:column;}
  .sheet-top{flex-shrink:0;cursor:grab;}
  .grab{width:40px;height:5px;border-radius:3px;background:var(--grab);margin:0 auto 12px;}
  .modal-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input, .field select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:11px;font:inherit;font-size:15px;background:var(--input-bg);color:var(--text);}
  .daypick{display:flex;gap:5px;}
  .daypick button{flex:1;padding:8px 0;border:1.5px solid var(--border);border-radius:9px;background:var(--input-bg);font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);}
  .daypick button.on{background:var(--accent1);color:#fff;border-color:var(--accent1);}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:11px;background:var(--input-bg);font:inherit;font-weight:700;cursor:pointer;color:var(--text);}
  .seg button.on{border-color:var(--accent1);background:var(--soft-accent);color:var(--soft-accent-text);}
  .modal-actions{display:flex;gap:10px;margin-top:8px;}
  .btn{flex:1;padding:13px;border:none;border-radius:12px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;}
  .btn.primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;}
  .btn.ghost{background:var(--ghost-btn);color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  "use strict";

  // ---------- constants ----------
  var PC = [ {c:"#2196F3",bg:"#e8f4fd"}, {c:"#E91E63",bg:"#fce4ec"} ]; // person colors
  var FC = { "Daily":"#FF6B35", "Weekly":"#4CAF50", "Biweekly":"#9C27B0", "Monthly":"#FF9800" };
  // Difficulty / effort: the weight used to split the workload fairly.
  var DIFF = { 1:{label:"Light",color:"#43A047"}, 2:{label:"Medium",color:"#FB8C00"}, 3:{label:"Heavy",color:"#E53935"} };
  function effortOf(c){ return c.effort||2; }
  function pColor(a){ return a==null ? "#9e9e9e" : PC[a].c; }   // null = unassigned (gray)
  function pName(a){ return a==null ? "Unassigned" : S.names[a]; }
  // Infer an emoji from keywords in the task name (used when none is set).
  function guessIcon(name){
    var n=String(name||"").toLowerCase();
    var map=[
      [["dish","plate","wash up","cutlery"],"🍽️"],
      [["cook","dinner","lunch","breakfast","meal","kitchen"],"🍳"],
      [["trash","garbage","rubbish","bin","recycl"],"🗑️"],
      [["laundry","clothes","washing","iron","fold","towel"],"🧺"],
      [["vacuum","hoover","sweep","broom","dust"],"🧹"],
      [["mop","floor"],"🧽"],
      [["toilet"],"🚽"],
      [["bath","shower","sink"],"🚿"],
      [["bed","sheet","linen","pillow"],"🛏️"],
      [["plant","garden","flower"],"🌱"],
      [["lawn","mow","yard","rake","leaves","grass"],"🌿"],
      [["dog","puppy","walk"],"🐶"],
      [["cat","litter"],"🐱"],
      [["fish","pet","bird"],"🐾"],
      [["grocer","shopping","market","supermarket"," buy","shop"],"🛒"],
      [["bill","rent"," pay","utilit","invoice"],"💡"],
      [["window"],"🪟"],
      [["car","vehicle"],"🚗"],
      [["fridge","refrigerator","freezer"],"🧊"],
      [["mail","post","package","parcel"],"📬"],
      [["medicine","pill","meds","pharmac"],"💊"],
      [["baby","kid","child"],"👶"],
      [["homework","school","study"],"📚"],
      [["clean","tidy","wipe"],"🧽"]
    ];
    for(var i=0;i<map.length;i++){ for(var j=0;j<map[i][0].length;j++){ if(n.indexOf(map[i][0][j])>=0) return map[i][1]; } }
    return "🧽";
  }
  var FREQ_MIG = { "Diario":"Daily", "Semanal":"Weekly", "Quincenal":"Biweekly", "Mensual":"Monthly" };
  var DOW_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  // getDay() values walked in Monday-first order — for displaying weekday pickers.
  var MON_FIRST = [1,2,3,4,5,6,0];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  // ---------- date helpers ----------
  function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
  function startOfWeek(d){ var x=new Date(d); var dow=x.getDay(); x.setDate(x.getDate()-((dow+6)%7)); x.setHours(0,0,0,0); return x; } // Monday
  function daysBetween(a,b){ return Math.round((b-a)/86400000); }

  // ---------- single source of truth for scheduling ----------
  // The ONLY function that decides whether a chore shows on a given date.
  function isDue(ch, date){
    switch(ch.freq){
      case "Daily":     return (ch.weekdays&&ch.weekdays.length) ? ch.weekdays.indexOf(date.getDay())>=0 : true;
      case "Weekly":    return (ch.weekdays||[]).indexOf(date.getDay())>=0;
      case "Biweekly":  { var sp=String(ch.startDate).split("-"); var anchor=new Date(+sp[0],(+sp[1])-1,+sp[2]); anchor.setHours(0,0,0,0);
                          var d2=new Date(date); d2.setHours(0,0,0,0);
                          var diff=daysBetween(anchor,d2); return diff>=0 && diff%14===0; }
      case "Monthly":   { if(ch.startDate){ var sp2=String(ch.startDate).split("-"); var anchor2=new Date(+sp2[0],(+sp2[1])-1,+sp2[2]); anchor2.setHours(0,0,0,0);
                            var d3=new Date(date); d3.setHours(0,0,0,0);
                            var diff2=daysBetween(anchor2,d3); return diff2>=0 && diff2%28===0; }
                          return date.getDate()===ch.dayOfMonth; }
      default: return false;
    }
  }

  // Weekdays (Sun=0..Sat=6) sorted Monday-first for display.
  function sortedWeekdays(arr){ return (arr||[]).slice().sort(function(a,b){ return ((a+6)%7)-((b+6)%7); }); }
  // Biweekly helpers: the weekday a date-string lands on, and the next such weekday from today.
  function weekdayOfYMD(s){ var p=String(s).split("-"); return new Date(+p[0],(+p[1])-1,+p[2]).getDay(); }
  function nextWeekdayYMD(w){ var d=new Date(TODAY); var add=(w - d.getDay() + 7)%7; d.setDate(d.getDate()+add); return ymd(d); }
  // Human-readable "when does this happen" used across the overview & cards.
  function scheduleLabel(c){
    if(c.freq==="Daily")    return (c.weekdays&&c.weekdays.length) ? sortedWeekdays(c.weekdays).map(function(d){return DOW_SHORT[d];}).join(" · ") : "Every day";
    if(c.freq==="Weekly")   return (c.weekdays&&c.weekdays.length) ? sortedWeekdays(c.weekdays).map(function(d){return DOW_SHORT[d];}).join(" · ") : "No day set";
    if(c.freq==="Biweekly") return "Every 2 weeks · "+DOW_SHORT[weekdayOfYMD(c.startDate)];
    if(c.freq==="Monthly")  return c.startDate ? "Every 4 weeks · "+DOW_SHORT[weekdayOfYMD(c.startDate)] : "Day "+c.dayOfMonth+" each month";
    return "";
  }
  // Tasks whose day is a weekday choice (so we can show quick day-chips).
  function usesWeekdays(c){ return c.freq==="Daily" || c.freq==="Weekly"; }
  function toggleWeekday(c, dow){
    if(!c.weekdays) c.weekdays=[];
    var k=c.weekdays.indexOf(dow);
    if(k>=0) c.weekdays.splice(k,1); else c.weekdays.push(dow);
    save(); render();
  }

  // ---------- seed / state ----------
  var TODAY = new Date(); TODAY.setHours(0,0,0,0);
  function defaultChores(){
    var monAnchor = ymd(startOfWeek(TODAY)); // a Monday for the quincenal anchor
    return [
      {id:1, name:"Wash the dishes",     freq:"Daily",    assignee:0, icon:"🍽️", effort:2},
      {id:2, name:"Water the plants",    freq:"Daily",    assignee:1, icon:"🌱", effort:1},
      {id:3, name:"Take out the trash",  freq:"Weekly",   assignee:1, icon:"🗑️", weekdays:[1,4], effort:1},
      {id:4, name:"Vacuum the living room",freq:"Weekly", assignee:0, icon:"🧹", weekdays:[6], effort:2},
      {id:5, name:"Clean the bathroom",  freq:"Weekly",   assignee:0, icon:"🚿", weekdays:[0], effort:3},
      {id:6, name:"Weekly groceries",    freq:"Weekly",   assignee:1, icon:"🛒", weekdays:[6], effort:3},
      {id:7, name:"Change the sheets",   freq:"Biweekly", assignee:1, icon:"🛏️", startDate:monAnchor, effort:2},
      {id:8, name:"Pay the bills",       freq:"Monthly",  assignee:0, icon:"💡", dayOfMonth:5, effort:1}
    ];
  }

  var S = {
    chores: load("nh_chores", defaultChores()),
    names:  load("nh_names", ["Nico","Caro"]),
    doneLog:load("nh_doneLog", seedDoneLog()),
    reminders: load("nh_reminders", []),
    occurrences: load("nh_occurrences", {}),
    balances: load("nh_balances", [0,0]),
    rewards: load("nh_rewards", []),
    redemptions: load("nh_redemptions", []),
    badges: load("nh_badges", {}),
    balancesMigratedAt: parseInt(localStorage.getItem("nh_balancesMigratedAt")||"0",10) || null,
    deviceUser: load("nh_deviceUser", 0), // which person uses THIS phone (device-local, not synced)
    tab: "today",
    selectedWeekDay: TODAY.getDay(),
    weekOffset: 0,
    dayOffset: 0,
    monthOffset: 0,
    monthSelected: null,
    statsMonthOffset: 0,
    filterPerson: null,
    modal: null
  };

  // One-time: move anyone still on the old default names to the new ones.
  try{
    if(!localStorage.getItem("nh_names_migrated")){
      if(S.names[0]==="Nico" && S.names[1]==="Sam"){ S.names=["Nico","Caro"]; }
      localStorage.setItem("nh_names_migrated","1");
      save();
    }
  }catch(e){}

  // Migrate any old Spanish frequency labels on stored tasks to English.
  (function(){ var ch=false; S.chores.forEach(function(c){ if(FREQ_MIG[c.freq]){ c.freq=FREQ_MIG[c.freq]; ch=true; } }); if(ch) save(); })();

  function load(k,def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }
  function saveLocal(){ try{
    localStorage.setItem("nh_chores",JSON.stringify(S.chores));
    localStorage.setItem("nh_names",JSON.stringify(S.names));
    localStorage.setItem("nh_doneLog",JSON.stringify(S.doneLog));
    localStorage.setItem("nh_reminders",JSON.stringify(S.reminders));
    localStorage.setItem("nh_occurrences",JSON.stringify(S.occurrences));
    localStorage.setItem("nh_balances",JSON.stringify(S.balances));
    localStorage.setItem("nh_rewards",JSON.stringify(S.rewards));
    localStorage.setItem("nh_redemptions",JSON.stringify(S.redemptions));
    localStorage.setItem("nh_badges",JSON.stringify(S.badges));
    if(S.balancesMigratedAt) localStorage.setItem("nh_balancesMigratedAt", String(S.balancesMigratedAt));
  }catch(e){} }
  function save(){ ensureOccurrences(); saveLocal(); pushState(); }

  // ---------- occurrences (Phase 1 foundation) ----------
  // Each scheduled date of each template gets its own per-occurrence record:
  //   { assignee, done, doneAt, pinned }
  // Materialised lazily in a rolling window [start of last week → today + 14 days].
  // ensureOccurrences is idempotent: it only ADDS records that don't exist yet.
  // On first run after the new build, doneLog completions get folded into the
  // matching occurrences so history shows the right person without back-filling.
  function occKey(choreId, date){ return choreId+"_"+ymd(date); }
  // One-shot: seed Purr balances from historical doneLog the first time this build
  // runs, so users who've been completing tasks for weeks don't start at zero.
  function migrateBalancesOnce(){
    if(S.balancesMigratedAt) return;

  // A day counts toward a person's streak if they had >=1 occurrence assigned to them
  // that day AND all of those occurrences are marked done. Days where they had nothing
  // scheduled are streak-neutral — neither break nor extend. Today only counts if
  // already 100% done; today-in-progress is skipped without breaking the streak.
  function computeStreak(personIdx){
    if(personIdx !== 0 && personIdx !== 1) return 0;
    var streak = 0;
    for(var i = 0; i <= 365; i++){
      var d = addDays(TODAY, -i);
      var owed = 0, done = 0;
      for(var k = 0; k < S.chores.length; k++){
        var c = S.chores[k];
        if(!isDue(c, d)) continue;
        if(occAssignee(c, d) !== personIdx) continue;
        owed++;
        if(isDone(c, d)) done++;
      }
      if(owed === 0) continue;          // neutral day — no break, no increment
      if(done === owed){ streak++; continue; }
      if(i === 0) continue;             // today not yet finished — don't break
      break;                            // a past day with anything undone ends the streak
    }
    return streak;
  }

  // Deal out every upcoming non-done, non-locked occurrence in the next 14 days so
  // total effort ends up balanced across both people. Done/locked occurrences count
  // toward the running totals and aren't touched. Each newly-shuffled occurrence is
  // locked to its new person; the lock drops automatically when the occurrence is
  // marked done. The template's default assignee is left alone — it just supplies
  // the starting person for occurrences materialised in the future.
  function shuffleAssignments(){
    var totals=[0,0]; var pool=[];
    var from=new Date(TODAY); var to=addDays(TODAY,14);

        var o = ensureOcc(c, d);

        } else {

    for(var i=pool.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=pool[i]; pool[i]=pool[j]; pool[j]=t; }

  // ---------- tiny DOM helper ----------
  function h(tag, attrs){
    var el=document.createElement(tag);

      else if(k==="text") el.textContent=attrs[k];
      else if(k==="html") el.innerHTML=attrs[k];
      else if(k.slice(0,2)==="on") el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
      else if(k==="style") el.setAttribute("style",attrs[k]);
      else el.setAttribute(k,attrs[k]);

    for(var i=2;i<arguments.length;i++){
      var c=arguments[i]; if(c==null) continue;
      if(Array.isArray(c)) c.forEach(function(x){ if(x!=null) el.appendChild(typeof x==="string"?document.createTextNode(x):x); });
      else el.appendChild(typeof c==="string"?document.createTextNode(c):c);

  }

  // ---------- calendar (.ics) export ----------
  // Generates recurring calendar events so the phone's own calendar fires the
  // reminders. No network, no backend — just a downloaded file the user imports.
  function p2(n){ return (n<10?"0":"")+n; }
  function icsDate(d){ return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate()); }
  function icsNextDay(d){ var x=new Date(d); x.setDate(x.getDate()+1); return x; }
  function icsStampUTC(){ var d=new Date(); return d.getUTCFullYear()+p2(d.getUTCMonth()+1)+p2(d.getUTCDate())+"T"+p2(d.getUTCHours())+p2(d.getUTCMinutes())+p2(d.getUTCSeconds())+"Z"; }
  function icsEscape(s){ return String(s).replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n"); }
  function buildICS(filter){
    var stamp=icsStampUTC();
    var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Olympaws//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Olympaws"];
    // One-off (non-recurring) all-day events for the next 8 days, computed with
    // the app's own isDue() so they match exactly what the app shows. Re-export
    // each week to get the next week — and to reflect the latest Shuffle.
    for(var off=0; off<8; off++){
      var day=addDays(TODAY, off);
      S.chores.forEach(function(c){
        if(!isDue(c, day)) return;
        if(filter===0 || filter===1){ if(c.assignee!==filter) return; }
        var summary=icsEscape((c.icon?c.icon+" ":"")+c.name+" — "+pName(c.assignee));
        L.push("BEGIN:VEVENT",
          "UID:nh-"+c.id+"-"+icsDate(day)+"@nuestro-hogar","DTSTAMP:"+stamp,
          "DTSTART;VALUE=DATE:"+icsDate(day),"DTEND;VALUE=DATE:"+icsDate(icsNextDay(day)),
          "SUMMARY:"+summary,
          "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+summary,"TRIGGER:PT9H","END:VALARM",
          "END:VEVENT");
      });
    }
    L.push("END:VCALENDAR");
    return L.join("\r\n");
  }
  function downloadICS(filter){
    try{
      var blob=new Blob([buildICS(filter)], {type:"text/calendar;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      var who=(filter===0||filter===1)?"-"+String(S.names[filter]||"").toLowerCase().replace(/[^a-z0-9]/g,""):"";
      a.href=url; a.download="nuestro-hogar"+who+".ics";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }catch(e){ alert("Couldn't export the calendar."); }
  }

  // ---------- data backup (export / import) ----------
  // A one-tap, offline "save a copy" of ALL app data to a JSON file, and a
  // restore that reads one back. No network — your safety net independent of
  // any cloud. Keep the file on your phone / Synology.
  function exportBackup(){
    try{
      var data={ app:"our-home", version:1, exportedAt:new Date().toISOString(),
                 names:S.names, chores:S.chores, doneLog:S.doneLog, reminders:S.reminders };
      var blob=new Blob([JSON.stringify(data,null,2)], {type:"application/json;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url; a.download="our-home-backup-"+ymd(new Date())+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }catch(e){ alert("Couldn't create the backup file."); }
  }
  function importBackup(file){
    var reader=new FileReader();
    reader.onload=function(){
      var data;
      try{ data=JSON.parse(reader.result); }catch(e){ alert("That file isn't a valid backup."); return; }
      if(!data || !Array.isArray(data.chores)){ alert("That file doesn't look like an Olympaws backup."); return; }
      if(!confirm("Replace ALL current data with this backup? Your current chores, history and reminders will be overwritten. This can't be undone.")) return;
      S.chores   = data.chores;
      S.names    = (Array.isArray(data.names) && data.names.length===2) ? data.names : S.names;
      S.doneLog  = (data.doneLog && typeof data.doneLog==="object") ? data.doneLog : {};
      S.reminders= Array.isArray(data.reminders) ? data.reminders : [];
      save(); S.modal=null; render();
      alert("Backup restored.");
    };
    reader.onerror=function(){ alert("Couldn't read that file."); };
    reader.readAsText(file);
  }

  // ---------- automatic weekly snapshot ----------
  // Once a week (checked on app open) we save a snapshot of everything into the
  // app's own storage under a FIXED key, so each new one OVERRIDES the previous.
  // It's a one-tap rollback point that lives on your phone, fully offline.
  function takeWeeklySnapshot(){
    try{
      var snap={ app:"our-home", version:1, ts:Date.now(),
                 names:S.names, chores:S.chores, doneLog:S.doneLog, reminders:S.reminders };
      localStorage.setItem("nh_weeklySnapshot", JSON.stringify(snap)); // overrides previous
      localStorage.setItem("nh_weeklyBackupAt", String(snap.ts));
    }catch(e){}
  }
  function maybeWeeklySnapshot(){
    try{
      var last=parseInt(localStorage.getItem("nh_weeklyBackupAt")||"0",10);
      if(!last || (Date.now()-last) >= 7*86400000){ takeWeeklySnapshot(); }
    }catch(e){}
  }
  function restoreWeeklySnapshot(){
    var raw=null; try{ raw=localStorage.getItem("nh_weeklySnapshot"); }catch(e){}
    if(!raw){ alert("No weekly backup yet — one is created automatically once a week."); return; }
    var data=null; try{ data=JSON.parse(raw); }catch(e){}
    if(!data || !Array.isArray(data.chores)){ alert("The weekly backup looks invalid."); return; }
    if(!confirm("Restore everything to the weekly backup from "+new Date(data.ts).toLocaleString()+"? Your current data will be overwritten.")) return;
    S.chores   = data.chores;
    S.names    = (Array.isArray(data.names) && data.names.length===2) ? data.names : S.names;
    S.doneLog  = (data.doneLog && typeof data.doneLog==="object") ? data.doneLog : {};
    S.reminders= Array.isArray(data.reminders) ? data.reminders : [];
    save(); S.modal=null; render();
    alert("Restored the weekly backup.");
  }

  // ---------- notifications (web push) ----------
  // Real push delivery: this device subscribes and stores its subscription in
  // Supabase; a scheduled Edge Function sends the push when a reminder is due.
  var VAPID_PUBLIC_KEY = "BMA34To-VQu0h-zV0Mp0yIZ7tN_d9GqmDxFooaHkXCy-9V72J-uggxIHGv1RE1_TujG40xzgn7kqAiVtQsVvRzk";
  function urlBase64ToUint8Array(base64String){
    var padding="=".repeat((4 - base64String.length % 4) % 4);
    var base64=(base64String + padding).replace(/-/g,"+").replace(/_/g,"/");
    var raw=atob(base64); var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++){ arr[i]=raw.charCodeAt(i); }
    return arr;
  }
  function notifStatus(){ return ("Notification" in window) ? Notification.permission : "unsupported"; }
  function enableNotifications(){
    if(!("Notification" in window)){ alert("This device doesn't support notifications."); return; }
    Notification.requestPermission().then(function(perm){
      if(perm==="granted"){ try{ localStorage.setItem("nh_notif","1"); }catch(e){} subscribeToPush(); }
      else if(perm==="denied"){ alert("Notifications are blocked. Re-enable them in your browser/site settings."); }
      render();
    });
  }
  function subscribeToPush(){
    if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    if(!VAPID_PUBLIC_KEY || !isAuthed()) return;
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
    }).then(function(sub){
      var j=sub.toJSON();
      try{ localStorage.setItem("nh_pushSub", JSON.stringify(j)); }catch(e){}
      // Store this phone's subscription so the scheduler can deliver reminder pushes.
      var tz=null; try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||null; }catch(e){}
      var hh=authHeaders(true); hh["Prefer"]="resolution=merge-duplicates";
      return fetch(SB_URL+"/rest/v1/push_subscriptions?on_conflict=endpoint", { method:"POST", headers:hh,
        body: JSON.stringify({ endpoint:j.endpoint, email:myEmail(), p256dh:j.keys.p256dh, auth:j.keys.auth, tz:tz }) });
    }).catch(function(e){ console.warn("Push subscribe failed:", e); });
  }

  // ---------- all tasks tab ----------
  function taskRow(c){
    var eff=effortOf(c);
    var main=h("div",{class:"card-main"},
      h("div",{class:"card-name", text:(c.pinned?"🔒 ":"")+c.name}),
      h("div",{class:"card-tags"},
        h("span",{class:"tag", style:"background:"+FC[c.freq], text:c.freq}),
        h("span",{class:"tag", style:"background:"+DIFF[eff].color, text:eff+" pt"}),
        h("span",{class:"tag person", style:"background:"+pColor(c.assignee), text:pName(c.assignee)})
      ),
      // When does it happen — always shown in the overview.
      h("div",{style:"font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:5px;"},
        h("span",{text:"📆"}), h("span",{text:scheduleLabel(c)}))
    );
    // Quick day-chips: tap to set the day(s) right here, no need to open edit.
    if(usesWeekdays(c)){
      var strip=h("div",{class:"daypick", style:"margin-top:8px;"});
      MON_FIRST.forEach(function(dow){
        var on=(c.weekdays||[]).indexOf(dow)>=0;
        strip.appendChild(h("button",{class:(on?"on":""), style:"padding:6px 0;font-size:10.5px;",
          onClick:function(e){ e.stopPropagation(); toggleWeekday(c,dow); }, text:DOW_SHORT[dow][0]}));
      });
      main.appendChild(strip);
    }
    return h("div",{class:"card", style:"cursor:pointer;align-items:flex-start;", onClick:function(){ openEdit(c); }},
      h("div",{class:"card-icon", text:c.icon}),
      main,
      h("div",{style:"color:var(--muted);font-size:20px;margin-left:4px;", text:"›"})
    );
  }
  function viewTasks(){
    var wrap=h("div",{class:"content"});
    var list=S.chores.filter(function(c){ return S.filterPerson===null || c.assignee===S.filterPerson; });
    wrap.appendChild(h("div",{class:"section-title", text:"All tasks ("+list.length+")"}));
    if(list.length===0){ wrap.appendChild(h("div",{class:"empty"}, h("span",{class:"big",text:"📋"}), "Tap + to add a task")); }
    else {
      list.slice().sort(function(a,b){ return (a.assignee-b.assignee) || String(a.name).localeCompare(String(b.name)); })
        .forEach(function(c){ wrap.appendChild(taskRow(c)); });
    }
    return wrap;
  }

  // ---------- header / nav / render ----------
  function header(){
    var todays=choresForDay(TODAY);
    var done=todays.filter(function(c){return isDone(c,TODAY);}).length;
    var pct=todays.length? Math.round(done/todays.length*100):0;
    var hd=h("div",{class:"header"},
      h("div",{class:"title"}, "🐾", h("span",{text:"Olympaws"})),
      h("div",{class:"sub", style:"cursor:pointer", text:S.names[0]+" & "+S.names[1]+"  ⚙️", onClick:openNames}),
      h("div",{class:"progress-wrap"},
        h("div",{class:"progress-top"}, h("span",{text:"Today's progress"}), h("span",{text:done+" of "+todays.length})),
        h("div",{class:"progress-bar"}, h("div",{class:"progress-fill", style:"width:"+pct+"%"}))
      )
    );
    var filters=h("div",{class:"filters"});
    filters.appendChild(h("button",{class:"chip"+(S.filterPerson===null?" active":""), text:"All", onClick:function(){ S.filterPerson=null; render(); }}));
    [0,1].forEach(function(p){ filters.appendChild(h("button",{class:"chip"+(S.filterPerson===p?" active":""), text:S.names[p], onClick:function(){ S.filterPerson=(S.filterPerson===p?null:p); render(); }})); });
    hd.appendChild(filters);
    return hd;
  }

  function nav(){
    var tabs=[["today","🏠","Today"],["week","📅","Week"],["month","🗓️","Month"],["tasks","📋","Tasks"],["logros","🏆","Stats"]];
    var n=h("div",{class:"nav"});
    tabs.forEach(function(t){
      n.appendChild(h("button",{class:(S.tab===t[0]?"active":""), onClick:function(){ S.tab=t[0]; render(); }},
        h("span",{class:"ic",text:t[1]}), t[2]));
    });
    return n;
  }

  function render(){
    var root=document.getElementById("root");
    root.innerHTML="";
    if(!isAuthed()){ document.body.classList.remove("modal-open"); root.appendChild(viewLogin()); return; }
    root.appendChild(header());
    var body;
    if(S.tab==="today") body=viewToday();
    else if(S.tab==="week") body=viewWeek();
    else if(S.tab==="month") body=viewMonth();
    else if(S.tab==="tasks") body=viewTasks();
    else body=viewLogros();
    root.appendChild(body);
    if(S.tab==="today"||S.tab==="week"||S.tab==="tasks"){ root.appendChild(h("button",{class:"fab", text:"+", onClick:openAdd})); }
    root.appendChild(nav());
    if(S.modal==="add") root.appendChild(modalAdd());
    if(S.modal==="names") root.appendChild(modalNames());
    if(S.modal==="reminder") root.appendChild(modalReminder());
    if(S.modal==="calexport") root.appendChild(modalCalExport());
    if(S.modal==="cat") root.appendChild(modalCat());
    if(S.modal==="reward") root.appendChild(modalReward());
    document.body.classList.toggle("modal-open", !!S.modal); // lock page scroll behind sheets
  }

  captureAuthFromHash();
  maybeWeeklySnapshot();
  ensureOccurrences();
  migrateBalancesOnce();
  render();
  if(isAuthed()) pullState();
  setInterval(function(){ if(isAuthed() && document.visibilityState!=="hidden") pullState(); }, 10000);
  document.addEventListener("visibilitychange", function(){ if(document.visibilityState==="visible") pullState(); });
  window.addEventListener("online", pullState);
})();

// Register the Service Worker for offline use (no-op when opened via file://).
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) {
      console.warn("SW registration failed:", e);
    });
  });
}
</script>
</body>
</html>
