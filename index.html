  // Drop this single (chore, date) without marking it done. Writes a
  // tombstone at the occurrence key so showsOnDay hides the card. Other
  // scheduled days for this chore stay put.
  function skipOccurrence(ch, date){
    if(!S.occurrences) S.occurrences = {};
    var key = occKey(ch.id, date);
    var existing = S.occurrences[key];
    if(existing && existing.done){
      alert("This task is already done. Uncheck it first if you want to skip it.");
      return;
    }
    S.occurrences[key] = { tombstone: true };
    save(); render();
  }

  // ---------- Occurrence sheet ----------
  // One chore on one date. Opens from any chore card tap on Today/Week/Month.
  // Replaces the old tap-cycle-assignee on the person tag, which silently
  // wrote a per-occurrence override with no UI affordance for which surface
  // (template vs occurrence) the user was actually editing.
  var occSheetCtx = null;
  function openOccurrence(ch, date){
    occSheetCtx = { choreId: ch.id, date: new Date(date) };
    S.modal = "occurrence"; render();
  }
  function closeOccurrence(){ occSheetCtx = null; S.modal = null; render(); }
  function setOccAssignee(ch, date, to){
    var o = ensureOcc(ch, date);
    var prev = o.assignee;
    if(prev === to) return;
    o.assignee = to;
    delete o.balanced; // user override → no longer a rebalance swap
    // Mirror the rebalance the old tap-cycle did: done occurrences need to
    // swing their points to the new owner without going negative.
    if(o.done){
      var pts = effortOf(ch);
      if(prev === 0 || prev === 1){
        S.balances[prev] = Math.max(0, (S.balances[prev]||0) - pts);
        recordEvent("task_undone", { chore: ch, date: date, assignee: prev, doneAt: o.doneAt });
      }
      if(o.assignee === 0 || o.assignee === 1){
        S.balances[o.assignee] = (S.balances[o.assignee]||0) + pts;
        recordEvent("task_done", { chore: ch, date: date, assignee: o.assignee, doneAt: o.doneAt });
        checkRumMilestones(o.assignee);
      }
    }
    save(); render();
  }
  function moveOccurrence(ch, fromDate, toDate){
    if(sameDay(fromDate, toDate)) return;
    if(isDone(ch, fromDate)){ alert("This day is already done — undo it first to move it."); return; }
    var toKey = occKey(ch.id, toDate);
    var existing = S.occurrences[toKey];
    if(existing && !existing.tombstone){
      alert("'"+ch.name+"' is already on "+DOW_SHORT[toDate.getDay()]+" "+toDate.getDate()+".");
      return;
    }
    // Carry the assignee from the source onto a pinned occurrence on the new
    // date. Tombstone the source so isDue/ensureOccurrences don't re-place a
    // card on the original day.
    var srcAssignee = occAssignee(ch, fromDate);
    S.occurrences[occKey(ch.id, fromDate)] = { tombstone: true };
    S.occurrences[toKey] = { assignee: srcAssignee, done: false, doneAt: null, pinned: true };
    occSheetCtx.date = new Date(toDate);
    save(); render();
  }

  // ---------- calendar (.ics) export ----------
  // Generates recurring calendar events so the phone's own calendar fires the
  // reminders. No network, no backend — just a downloaded file the user imports.
  function p2(n){ return (n<10?"0":"")+n; }
  function icsDate(d){ return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate()); }
  function icsNextDay(d){ var x=new Date(d); x.setDate(x.getDate()+1); return x; }
  function icsStampUTC(){ var d=new Date(); return d.getUTCFullYear()+p2(d.getUTCMonth()+1)+p2(d.getUTCDate())+"T"+p2(d.getUTCHours())+p2(d.getUTCMinutes())+p2(d.getUTCSeconds())+"Z"; }
  function icsEscape(s){ return String(s).replace(/([\\;,])/g,"\\$1").replace(/\n/g,"\\n"); }
  function buildICS(filter){
    var stamp=icsStampUTC();
    var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Olympaws//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Olympaws"];
    // For each chore, lay down its occurrences in the current AND next period
    // (per the schedule kind). Current-period assignments come from the
    // Planning sheet; next-period slots are usually unassigned, waiting to be
    // planned. Re-export each period to refresh.
    S.chores.forEach(function(c){
      var ranges = periodRanges(c);
      if(!ranges) return;
      var start = ranges.current.start, end = ranges.next.end;
      // Skip past dates that have already been done — calendar should reflect
      // upcoming work, not historical receipts.
      if(start < TODAY) start = TODAY;
      for(var d=new Date(start); d<=end; d=addDays(d,1)){
        if(!showsOnDay(c, d)) continue;
        var who = occAssignee(c, d);
        // Filter by person: skip if filter is set AND a person is assigned but
        // doesn't match. Unassigned occurrences pass through under any filter so
        // the user can see what's still pending.
        if((filter===0 || filter===1) && (who===0 || who===1) && who!==filter) continue;
        var summary=icsEscape((c.icon?c.icon+" ":"")+c.name+" — "+pName(who));
        L.push("BEGIN:VEVENT",
          "UID:nh-"+c.id+"-"+icsDate(d)+"@nuestro-hogar","DTSTAMP:"+stamp,
          "DTSTART;VALUE=DATE:"+icsDate(d),"DTEND;VALUE=DATE:"+icsDate(icsNextDay(d)),
          "SUMMARY:"+summary,
          "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+summary,"TRIGGER:PT9H","END:VALARM",
          "END:VEVENT");
      }
    });
    L.push("END:VCALENDAR");
    return L.join("\r\n");
  }
  function downloadICS(filter){
    try{
      var blob=new Blob([buildICS(filter)], {type:"text/calendar;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      var who=(filter===0||filter===1)?"-"+String(S.names[filter]||"").toLowerCase().replace(/[^a-z0-9]/g,""):"";
      a.href=url; a.download="nuestro-hogar"+who+".ics";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }catch(e){ alert("Couldn't export the calendar."); }
  }

  // ---------- data backup (export / import) ----------
  // A one-tap, offline "save a copy" of ALL app data to a JSON file, and a
  // restore that reads one back. No network — your safety net independent of
  // any cloud. Keep the file on your phone / Synology.
  function exportBackup(){
    try{
      var data={ app:"our-home", version:1, exportedAt:new Date().toISOString(),
                 names:S.names, chores:S.chores, doneLog:S.doneLog, reminders:S.reminders };
      var blob=new Blob([JSON.stringify(data,null,2)], {type:"application/json;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url; a.download="our-home-backup-"+ymd(new Date())+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    }catch(e){ alert("Couldn't create the backup file."); }
  }
  function importBackup(file){
    var reader=new FileReader();
    reader.onload=function(){
      var data;
      try{ data=JSON.parse(reader.result); }catch(e){ alert("That file isn't a valid backup."); return; }
      if(!data || !Array.isArray(data.chores)){ alert("That file doesn't look like an Olympaws backup."); return; }
      if(!confirm("Replace ALL current data with this backup? Your current chores, history and reminders will be overwritten. This can't be undone.")) return;
      S.chores   = data.chores;
      S.names    = (Array.isArray(data.names) && data.names.length===2) ? data.names : S.names;
      S.doneLog  = (data.doneLog && typeof data.doneLog==="object") ? data.doneLog : {};
      S.reminders= Array.isArray(data.reminders) ? data.reminders : [];
      save(); S.modal=null; render();
      alert("Backup restored.");
    };
    reader.onerror=function(){ alert("Couldn't read that file."); };
    reader.readAsText(file);
  }

  // ---------- automatic weekly snapshot ----------
  // Once a week (checked on app open) we save a snapshot of everything into the
  // app's own storage under a FIXED key, so each new one OVERRIDES the previous.
  // It's a one-tap rollback point that lives on your phone, fully offline.
  function takeWeeklySnapshot(){
    try{
      var snap={ app:"our-home", version:1, ts:Date.now(),
                 names:S.names, chores:S.chores, doneLog:S.doneLog, reminders:S.reminders };
      localStorage.setItem("nh_weeklySnapshot", JSON.stringify(snap)); // overrides previous
      localStorage.setItem("nh_weeklyBackupAt", String(snap.ts));
    }catch(e){}
  }
  function maybeWeeklySnapshot(){
    try{
      var last=parseInt(localStorage.getItem("nh_weeklyBackupAt")||"0",10);
      if(!last || (Date.now()-last) >= 7*86400000){ takeWeeklySnapshot(); }
    }catch(e){}
  }
  function restoreWeeklySnapshot(){
    var raw=null; try{ raw=localStorage.getItem("nh_weeklySnapshot"); }catch(e){}
    if(!raw){ alert("No weekly backup yet — one is created automatically once a week."); return; }
    var data=null; try{ data=JSON.parse(raw); }catch(e){}
    if(!data || !Array.isArray(data.chores)){ alert("The weekly backup looks invalid."); return; }
    if(!confirm("Restore everything to the weekly backup from "+new Date(data.ts).toLocaleString()+"? Your current data will be overwritten.")) return;
    S.chores   = data.chores;
    S.names    = (Array.isArray(data.names) && data.names.length===2) ? data.names : S.names;
    S.doneLog  = (data.doneLog && typeof data.doneLog==="object") ? data.doneLog : {};
    S.reminders= Array.isArray(data.reminders) ? data.reminders : [];
    save(); S.modal=null; render();
    alert("Restored the weekly backup.");
  }

  // Real push delivery: this device subscribes and stores its subscription in
  // Supabase; a scheduled Edge Function sends the push when a reminder is due.
  var VAPID_PUBLIC_KEY = "BMA34To-VQu0h-zV0Mp0yIZ7tN_d9GqmDxFooaHkXCy-9V72J-uggxIHGv1RE1_TujG40xzgn7kqAiVtQsVvRzk";
  function urlBase64ToUint8Array(base64String){
    var padding="=".repeat((4 - base64String.length % 4) % 4);
    var base64=(base64String + padding).replace(/-/g,"+").replace(/_/g,"/");

  function notifStatus(){ return ("Notification" in window) ? Notification.permission : "unsupported"; }
  function enableNotifications(){
    if(!("Notification" in window)){ alert("This device doesn't support notifications."); return; }
    Notification.requestPermission().then(function(perm){
      if(perm==="granted"){ try{ localStorage.setItem("nh_notif","1"); }catch(e){} subscribeToPush(); }
      else if(perm==="denied"){ alert("Notifications are blocked. Re-enable them in your browser/site settings."); }

  function subscribeToPush(){
    if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    if(!VAPID_PUBLIC_KEY || !isAuthed()) return;

      return reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
    }).then(function(sub){
      var j=sub.toJSON();
      try{ localStorage.setItem("nh_pushSub", JSON.stringify(j)); }catch(e){}
      // Store this phone's subscription so the scheduler can deliver reminder pushes.
      var tz=null; try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||null; }catch(e){}
      var hh=authHeaders(true); hh["Prefer"]="resolution=merge-duplicates";
      return fetch(SB_URL+"/rest/v1/push_subscriptions?on_conflict=endpoint", { method:"POST", headers:hh,
        body: JSON.stringify({ endpoint:j.endpoint, email:myEmail(), p256dh:j.keys.p256dh, auth:j.keys.auth, tz:tz }) });
    }).catch(function(e){ console.warn("Push subscribe failed:", e); });
  }

  // ---------- all tasks tab ----------
  function taskRow(c){
    var eff=effortOf(c);
    var oneTime = (c.kind === "oneTime");
    var freqTag = oneTime
      ? h("span",{class:"tag", style:"background:#7d6bff", text:"One-time"})
      : h("span",{class:"tag", style:"background:"+FC[c.freq], text:c.freq});
    var when = oneTime && c.startDate
      ? (function(){ var d = parseYmd(c.startDate); return d
          ? (sameDay(d, TODAY) ? "Today" : DOW_SHORT[d.getDay()]+" "+d.getDate()+" "+MONTHS[d.getMonth()].slice(0,3))
          : c.startDate; })()
      : scheduleLabel(c);
    var prefix = (c.pinned ? "🔒 " : "") + (c.archived ? "✓ " : "");
    var main=h("div",{class:"card-main", style:c.archived?"opacity:0.6;":""},
      h("div",{class:"card-name", text:prefix+c.name}),
      h("div",{class:"card-tags"},
        freqTag,
        h("span",{class:"tag", style:"background:"+DIFF[eff].color, text:eff+" pt"}),
        h("span",{class:"tag person", style:"background:"+pColor(c.assignee), text:(c.assignee==null?"":(c.pinned?"🔒 ":c.rotate?"↻ ":""))+pName(c.assignee)})
      ),
      h("div",{style:"font-size:11.5px;color:var(--muted);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:5px;"},
        h("span",{text:"📆"}), h("span",{text:when}))
    );
    return h("div",{class:"card", style:"cursor:pointer;align-items:flex-start;", onClick:function(){ openEdit(c); }},
      h("div",{class:"card-icon", text:c.icon, style:c.archived?"opacity:0.55;":""}),
      main,
      h("div",{style:"color:var(--muted);font-size:20px;margin-left:4px;", text:"›"})
    );
  }
  function viewTasks(){
    var wrap=h("div",{class:"content"});
    // Quick monthly task split — same number the Stats workload bar shows,
    // surfaced here so you don't have to switch tabs just to glance at it.
    var split = monthlyTaskCounts(null);
    var splitRow = h("div",{style:"display:flex;justify-content:center;gap:14px;margin:0 0 12px;font-size:12.5px;font-weight:700;"},
      h("span",{style:"color:"+PC[0].c, text:S.names[0]+" "+split[0]+(split[0]===1?" task":" tasks")}),
      h("span",{style:"color:var(--muted);opacity:0.5;", text:"•"}),
      h("span",{style:"color:"+PC[1].c, text:S.names[1]+" "+split[1]+(split[1]===1?" task":" tasks")})
    );
    wrap.appendChild(splitRow);
    // Archived (done-and-tucked-away) one-time tasks live behind a foldable
    // section so the main list stays about 'what I still have to do'.
    var live = [], archived = [];
    S.chores.forEach(function(c){
      if(S.filterPerson!==null && c.assignee!==S.filterPerson) return;
      if(c.archived) archived.push(c); else live.push(c);
    });
    var recurring = live.filter(function(c){ return c.kind !== "oneTime"; });
    var oneTimes  = live.filter(function(c){ return c.kind === "oneTime"; });
    if(oneTimes.length){
      wrap.appendChild(h("div",{class:"section-title", text:"One-time tasks ("+oneTimes.length+")"}));
      oneTimes
        .slice().sort(function(a,b){ return (a.startDate||"").localeCompare(b.startDate||""); })
        .forEach(function(c){ wrap.appendChild(taskRow(c)); });
    }
    wrap.appendChild(h("div",{class:"section-title", text:(oneTimes.length?"Recurring tasks":"All tasks")+" ("+recurring.length+")"}));
    if(recurring.length===0 && oneTimes.length===0){
      wrap.appendChild(h("div",{class:"empty"}, h("span",{class:"big",text:"📋"}), "Tap + to add a task"));
    } else if(recurring.length){
      recurring.slice().sort(function(a,b){ return (a.assignee-b.assignee) || String(a.name).localeCompare(String(b.name)); })
        .forEach(function(c){ wrap.appendChild(taskRow(c)); });
    }
    if(archived.length){
      tasksArchiveOpen = !!tasksArchiveOpen;
      wrap.appendChild(h("button",{
        style:"width:100%;margin-top:14px;padding:10px;border:1.5px dashed var(--border);border-radius:11px;background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;",
        onClick:function(){ tasksArchiveOpen = !tasksArchiveOpen; render(); },
        text:(tasksArchiveOpen ? "▾ Completed one-times ("+archived.length+")" : "▸ Completed one-times ("+archived.length+")")
      }));
      if(tasksArchiveOpen){
        archived.slice().sort(function(a,b){ return (b.startDate||"").localeCompare(a.startDate||""); })
          .forEach(function(c){ wrap.appendChild(taskRow(c)); });
      }
    }
    return wrap;
  }
  // Tracks the 'Completed one-times' fold state — device-local UI only.
  var tasksArchiveOpen = false;

  // ---------- header / nav / render ----------
  function header(){
    var todays=choresForDay(TODAY);
    var done=todays.filter(function(c){return isDone(c,TODAY);}).length;
    var pct=todays.length? Math.round(done/todays.length*100):0;
    var hd=h("div",{class:"header"},
      h("div",{class:"title"}, "🐾", h("span",{text:"Olympaws"})),
      h("div",{class:"sub", style:"cursor:pointer", text:S.names[0]+" & "+S.names[1]+"  ⚙️", onClick:openNames}),
      h("div",{class:"progress-wrap"},
        h("div",{class:"progress-top"}, h("span",{text:"Today's progress"}), h("span",{text:done+" of "+todays.length})),
        h("div",{class:"progress-bar"}, h("div",{class:"progress-fill", style:"width:"+pct+"%"}))
      )
    );
    var filters=h("div",{class:"filters"});
    filters.appendChild(h("button",{class:"chip"+(S.filterPerson===null?" active":""), text:"All", onClick:function(){ S.filterPerson=null; render(); }}));
    [0,1].forEach(function(p){ filters.appendChild(h("button",{class:"chip"+(S.filterPerson===p?" active":""), text:S.names[p], onClick:function(){ S.filterPerson=(S.filterPerson===p?null:p); render(); }})); });
    hd.appendChild(filters);
    return hd;
  }

  // Floating top-right HUD: the device user's streak + Purr balance. Stays fixed
  // through scrolling, taps jump straight to the Stats tab where the source lives.
  // Force-update the app bundle: unregister the SW, clear every cache, and
  // reload. Same end state as 'swipe out of recents and reopen', but as a
  // one-tap chip so you don't have to babysit the PWA cache to see a new
  // version. Live data lives in Supabase / localStorage, so reloading
  // mid-session is safe.
  var updatingAt = 0;
  function forceAppUpdate(){
    updatingAt = Date.now(); render();
    var done = function(){ location.reload(); };
    Promise.resolve()
      .then(function(){
        if(!("serviceWorker" in navigator)) return;
        return navigator.serviceWorker.getRegistrations().then(function(regs){
          return Promise.all(regs.map(function(r){ return r.unregister(); }));
        });
      })
      .then(function(){
        if(!("caches" in window)) return;
        return caches.keys().then(function(names){
          return Promise.all(names.map(function(n){ return caches.delete(n); }));
        });
      })
      .then(done, done);
  }
  function topHud(){
    var p = (S.deviceUser === 0 || S.deviceUser === 1) ? S.deviceUser : 0;
    var streak = computeStreak(p);
    var bal = S.balances && (S.balances[p] != null) ? S.balances[p] : 0;
    var updating = !!updatingAt;
    var wrap = h("div",{class:"topbar", style:"gap:6px;"});
    var refreshBtn = h("button",{
      class:"topchip",
      style:"padding:6px 10px;font-size:15px;font-weight:800;"+(updating?"opacity:0.55;":""),
      title:"Update the app — pulls the latest build and reloads",
      onClick: forceAppUpdate,
      text: updating ? "…" : "↻"
    });
    var chip = h("button",{class:"topchip", onClick:function(){ S.tab="logros"; render(); }},
      h("img",{src:"./icons/streak.png", alt:"streak", style:"width:18px;height:18px;"}),
      h("span",{text:String(streak)}),
      h("span",{class:"sep"}),
      h("img",{src:"./icons/purr.png", alt:"Purrs", style:"width:14px;height:14px;"}),
      h("span",{text:String(bal)})
    );
    wrap.appendChild(refreshBtn);
    wrap.appendChild(chip);
    return wrap;
  }

  function nav(){
    var tabs=[["today","🏠","Today"],["month","🗓️","Month"],["tasks","📋","Tasks"],["logros","🏆","Stats"]];
    var n=h("div",{class:"nav"});
    tabs.forEach(function(t){
      n.appendChild(h("button",{class:(S.tab===t[0]?"active":""), onClick:function(){ S.tab=t[0]; render(); }},
        h("span",{class:"ic",text:t[1]}), t[2]));
    });
    return n;
  }

  function render(){
    // Save modal-scroll positions BEFORE wiping the DOM. Every assignee /
    // schedule tap rebuilds the tree from scratch, which would otherwise
    // dump the user back at the top of whatever sheet they were in. Keyed
    // by index because there's typically one modal-scroll at a time, but
    // matching by order handles edge cases too.
    var savedScrolls = Array.prototype.map.call(
      document.querySelectorAll(".modal-scroll"),
      function(el){ return el.scrollTop; }
    );
    var savedPageY = window.scrollY || window.pageYOffset || 0;
    var root=document.getElementById("root");
    root.innerHTML="";
    if(!isAuthed()){ document.body.classList.remove("modal-open"); root.appendChild(viewLogin()); return; }
    root.appendChild(header());
    root.appendChild(topHud());
    var body;
    if(S.tab==="today") body=viewToday();
    else if(S.tab==="month") body=viewMonth();
    else if(S.tab==="tasks") body=viewTasks();
    else body=viewLogros();
    root.appendChild(body);
    if(S.tab==="today"||S.tab==="tasks"){ root.appendChild(h("button",{class:"fab", text:"+", onClick:function(){ S.modal="addChoose"; render(); }})); }
    root.appendChild(nav());
    if(S.modal==="add") root.appendChild(modalAdd());
    if(S.modal==="addChoose") root.appendChild(modalAddChoose());
    if(S.modal==="names") root.appendChild(modalNames());
    if(S.modal==="reminder") root.appendChild(modalReminder());
    if(S.modal==="cat") root.appendChild(modalCat());
    if(S.modal==="catPopup") root.appendChild(modalCatPopup());
    if(S.modal==="reward") root.appendChild(modalReward());
    if(S.modal==="badge") root.appendChild(modalBadge());
    if(S.modal==="occurrence") root.appendChild(modalOccurrence());
    document.body.classList.toggle("modal-open", !!S.modal); // lock page scroll behind sheets
    // Restore scroll positions on the fresh DOM. Done synchronously so the
    // user doesn't see a flash at the top before snapping back.
    var newScrolls = document.querySelectorAll(".modal-scroll");
    savedScrolls.forEach(function(top, i){
      if(newScrolls[i]) newScrolls[i].scrollTop = top;
    });
    if(savedPageY) window.scrollTo(0, savedPageY);
  }

  captureAuthFromHash();
  maybeWeeklySnapshot();
  ensureOccurrences();
  clampBalances();
  updateMaxStreaks();
  evaluateBadges();
  render();
  if(isAuthed()) pullState();
  setInterval(function(){ if(isAuthed() && document.visibilityState!=="hidden") pullState(); }, 10000);
  document.addEventListener("visibilitychange", function(){ if(document.visibilityState==="visible") pullState(); });
  window.addEventListener("online", pullState);
})();

// Register the Service Worker for offline use (no-op when opened via file://).
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) {
      console.warn("SW registration failed:", e);
    });
  });
}
</script>
</body>
</html>
